[tool.ruff]
line-length = 110
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "B", "UP"]
ignore = [
    "E402",  # module import order — main.py configures logging before imports
    "E501",  # long lines: FastAPI signatures and display strings read better unwrapped
    "E731",  # lambda assignments
    "B007",  # unused loop variables in dict iteration
    "B008",  # FastAPI Depends/Query in defaults is idiomatic
    "B024",  # plugin base class is intentionally hook-optional
    "B027",  # ditto — empty overridable hooks
    "UP007", # Optional[X] style kept for consistency
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
