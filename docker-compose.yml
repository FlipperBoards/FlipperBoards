version: '3.9'

services:
  flipperboards:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - FB_DB_PATH=/app/data/flipperboards.db
      - FB_HOST=0.0.0.0
      - FB_PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/state"]
      interval: 30s
      timeout: 10s
      retries: 3
