services:
  flipperboards:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data        # SQLite database
      - ./data/uploads:/app/uploads  # uploaded photos
    environment:
      - FB_DB_PATH=/app/data/flipperboards.db
      - FB_HOST=0.0.0.0
      - FB_PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/state')"]
      interval: 30s
      timeout: 10s
      retries: 3
